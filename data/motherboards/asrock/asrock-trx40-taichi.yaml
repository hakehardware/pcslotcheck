id: asrock-trx40-taichi
manufacturer: ASRock
model: TRX40 Taichi
chipset: AMD TRX40
socket: sTRX4
form_factor: ATX
schema_version: "1.0"

memory:
  type: DDR4
  max_speed_mhz: 4666
  base_speed_mhz: 3200
  max_capacity_gb: 256
  ecc_support: true
  channels: 4
  slots:
    - id: ddr4_a1
      channel: A
      position: 1
      recommended: true
    - id: ddr4_a2
      channel: A
      position: 2
      recommended: false
    - id: ddr4_b1
      channel: B
      position: 1
      recommended: true
    - id: ddr4_b2
