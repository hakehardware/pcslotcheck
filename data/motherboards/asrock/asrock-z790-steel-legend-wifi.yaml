id: asrock-z790-steel-legend-wifi
manufacturer: ASRock
model: Z790 Steel Legend WiFi
chipset: Intel Z790
socket: LGA 1700
form_factor: ATX
length_mm: 305
width_mm: 244
schema_version: "1.0"

memory:
  type: DDR5
  max_speed_mhz: 7200
  base_speed_mhz: 4800
  max_capacity_gb: 192
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M2_1 Hyper (CPU)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M2_2 Blazing (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_2
          logic: any_populated
        condition: M2_2 is occupied
        effect: PCIE1 will downgrade to x8 mode

  - id: m2_3
    label: M2_3 Hyper (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_4
    label: M2_4 Hyper (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_5
    label: M2_5 Hyper (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: false
    sharing: null

pcie_slots:
  - id: pcie_1
    label: PCIE1
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCIE2
    position: 2
    gen: 4
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

  - id: pcie_3
    label: PCIE3
    position: 3
    gen: 3
    electrical_lanes: 2
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

