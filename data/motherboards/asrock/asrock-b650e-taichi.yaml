id: asrock-b650e-taichi
manufacturer: ASRock
model: B650E Taichi
chipset: AMD B650E
socket: AM5
form_factor: E-ATX
schema_version: "2.0"

memory:
  type: DDR5
  max_speed_mhz: 7600
  base_speed_mhz: 4800
  max_capacity_gb: 192
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M2_1 Blazing (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "22110"
      - "2230"
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M2_2 Hyper (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_3
    label: M2_3 Hyper (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: disables
        targets:
          - pcie_2
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_3
          logic: any_populated
        condition: M2_3 is occupied
        effect: PCIE2 will be disabled

pcie_slots:
  - id: pcie_1
    label: PCIE1
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCIE2
    position: 2
    gen: 4
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

sata_ports:
  - id: sata_0
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_1
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_2
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_3
    version: "3.0"
    source: Chipset
    disabled_by: null

sources:
  - type: manual
    url: https://download.asrock.com/Manual/B650E%20Taichi.pdf
  - type: manufacturer
    url: https://www.asrock.com/mb/AMD/B650E%20Taichi/index.asp
