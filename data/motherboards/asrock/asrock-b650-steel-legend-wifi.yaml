  - slot_type: pcie
    slot_id: pcie_2
    x_pct: 3.0
    y_pct: 64.0
    width_pct: 40.0
    height_pct: 2.0

  - slot_type: pcie
    slot_id: pcie_3
    x_pct: 3.0
    y_pct: 82.0
    width_pct: 15.0
    height_pct: 1.5

  - slot_type: sata_group
    slot_id: sata
