id: asrock-b650-steel-legend-wifi
manufacturer: ASRock
model: B650 Steel Legend WiFi
chipset: AMD B650
socket: AM5
form_factor: ATX
length_mm: 305
width_mm: 244
schema_version: "1.0"

memory:
  type: DDR5
  max_speed_mhz: 7200
  base_speed_mhz: 4800
  max_capacity_gb: 192
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M2_1 Blazing (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M2_2 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2230"
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_3
    label: M2_3 (CPU)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

pcie_slots:
  - id: pcie_1
    label: PCIE1 (CPU)
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCIE2 (Chipset)
    position: 2
    gen: 3
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing:
      - type: bandwidth_split
        direction: pcie_to_m2
        trigger:
          slot_ids:
            - pcie_2
          logic: any_populated
        condition: SATA3_0 and SATA3_1 are both occupied
        effect: PCIE2 will downgrade to x2 mode

  - id: pcie_3
    label: PCIE3 (Chipset)
    position: 3
    gen: 4
    electrical_lanes: 1
    physical_size: x1
    source: Chipset
    reinforced: false
    sharing: null

sata_ports:
  - id: sata3_0
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata3_1
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata3_2
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata3_3
    version: "3.0"
    source: Chipset
    disabled_by: null

slot_positions:
  - slot_type: cpu
    slot_id: cpu
    x_pct: 30.0
    y_pct: 18.0
    width_pct: 14.0
    height_pct: 16.0

  - slot_type: dimm
    slot_id: dimm_a1
    x_pct: 72.0
    y_pct: 8.0
    width_pct: 1.8
    height_pct: 38.0

  - slot_type: dimm
    slot_id: dimm_a2
    x_pct: 74.5
    y_pct: 8.0
    width_pct: 1.8
    height_pct: 38.0

  - slot_type: dimm
    slot_id: dimm_b1
    x_pct: 77.0
    y_pct: 8.0
    width_pct: 1.8
    height_pct: 38.0

  - slot_type: dimm
    slot_id: dimm_b2
    x_pct: 79.5
    y_pct: 8.0
    width_pct: 1.8
    height_pct: 38.0

  - slot_type: m2
    slot_id: m2_1
    x_pct: 20.0
    y_pct: 42.0
    width_pct: 22.0
    height_pct: 1.5

  - slot_type: m2
    slot_id: m2_2
    x_pct: 20.0
    y_pct: 58.0
    width_pct: 22.0
    height_pct: 1.5

  - slot_type: m2
    slot_id: m2_3
    x_pct: 20.0
    y_pct: 72.0
    width_pct: 22.0
    height_pct: 1.5

  - slot_type: pcie
    slot_id: pcie_1
    x_pct: 3.0
