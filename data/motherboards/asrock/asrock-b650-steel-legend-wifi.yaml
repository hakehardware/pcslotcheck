id: asrock-b650-steel-legend-wifi
manufacturer: ASRock
model: B650 Steel Legend WiFi
chipset: B650
socket: AM5
form_factor: ATX
schema_version: "2.0"

memory:
  type: DDR5
  max_speed_mhz: 7200
  base_speed_mhz: 4800
  max_capacity_gb: 192
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M2_1 Blazing (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M2_2 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2230"
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_3
    label: M2_3 (CPU)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

pcie_slots:
  - id: pcie_1
    label: PCIE1 (CPU)
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCIE2 (Chipset)
    position: 2
    gen: 3
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing:
      - type: bandwidth_split
        direction: pcie_to_m2
        trigger:
          slot_ids:
            - pcie_2
          logic: any_populated
        condition: SATA3_0 and SATA3_1 are both occupied
        effect: PCIE2 will downgrade to x2 mode

  - id: pcie_3
    label: PCIE3 (Chipset)
    position: 3
    gen: 4
    electrical_lanes: 1
    physical_size: x1
    source: Chipset
    reinforced: false
    sharing: null

sata_ports:
  - id: sata3_0
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata3_1
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata3_2
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata3_3
    version: "3.0"
    source: Chipset
    disabled_by: null

sources:
  - type: manual
    url: https://download.asrock.com/Manual/B650%20Steel%20Legend%20WiFi.pdf
  - type: manufacturer
    url: https://www.asrock.com/mb/AMD/B650%20Steel%20Legend%20WiFi/index.asp
