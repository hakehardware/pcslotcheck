id: asus-prime-x870-p-wifi
manufacturer: ASUS
model: PRIME X870-P WIFI
chipset: AMD X870
socket: AM5
form_factor: ATX
length_mm: 305
width_mm: 244
schema_version: "1.0"

memory:
  type: DDR5
  max_speed_mhz: 8000
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: true
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M.2_1 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M.2_2 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: disables
        targets:
          - pcie_2
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_2
          logic: any_populated
        condition: M.2_2 is populated
        effect: PCIEX16(G4)_1 will be disabled

  - id: m2_3
    label: M.2_3 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: disables
        targets:
          - pcie_3
          - pcie_4
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_3
          logic: any_populated
        condition: M.2_3 is populated
        effect: PCIEX16(G4)_2 and PCIEX16(G4)_3 will be disabled

  - id: m2_4
    label: M.2_4 (Chipset)
    interface: PCIe
    gen: 3
    lanes: 2
    form_factors:
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: false
    sharing: null

pcie_slots:
  - id: pcie_1
    label: PCIEX16(G5)
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCIEX16(G4)_1
    position: 2
    gen: 4
    electrical_lanes: 1
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

  - id: pcie_3
    label: PCIEX16(G4)_2
    position: 3
    gen: 4
    electrical_lanes: 1
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

  - id: pcie_4
    label: PCIEX16(G4)_3
    position: 4
    gen: 4
    electrical_lanes: 1
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

sata_ports:
  - id: sata_1
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_2
    version: "3.0"
    source: Chipset
    disabled_by: null

