id: asus-rog-strix-z690-e-gaming-wifi
manufacturer: ASUS
model: ROG STRIX Z690-E GAMING WIFI
chipset: Intel Z690
socket: LGA 1700
form_factor: ATX
length_mm: 305
width_mm: 244
schema_version: "1.0"

memory:
  type: DDR5
  max_speed_mhz: 6400
  base_speed_mhz: 4800
  max_capacity_gb: 192
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M.2_1 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "22110"
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_1
          logic: any_populated
        condition: M.2_1 is occupied with SSD
        effect: PCIEX16(G5) will run x8 only

  - id: m2_2
    label: M.2_2 (CPU)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_3
    label: M.2_3 (Chipset)
    interface: PCIe_or_SATA
    gen: 4
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: true
    heatsink_included: true
    sharing: null

pcie_slots:
