id: asus-rog-maximus-z890-hero
manufacturer: ASUS
model: ROG MAXIMUS Z890 HERO
chipset: Intel Z890
socket: LGA 1851
form_factor: ATX
length_mm: 305
width_mm: 244
schema_version: "1.0"

memory:
  type: DDR5
  max_speed_mhz: 9200
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M.2_1 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "22110"
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M.2_2 (CPU)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_3
    label: M.2_3 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_3
          logic: any_populated
        condition: M.2_3 or M.2_4 is enabled
        effect: PCIEX16(G5) will run at x8 only

  - id: m2_4
    label: M.2_4 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_4
          logic: any_populated
        condition: M.2_3 or M.2_4 is enabled
        effect: PCIEX16(G5) will run at x8 only

  - id: m2_5
    label: M.2_5 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_6
    label: M.2_6 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

pcie_slots:
