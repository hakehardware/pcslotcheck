m2_slots:
  - id: m2_1
    label: M.2_1 (PCIe 4.0 x4 / SATA)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: true
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M.2_2 (PCIe 4.0 x4 / SATA, shared U.2_1)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: true
    heatsink_included: true
    sharing:
      - type: disables
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_2
          logic: any_populated
        condition: M.2_2 slot is populated
        effect: U.2_1 is disabled

  - id: m2_3
    label: M.2_3 (PCIe 4.0 x4 / SATA, shared U.2_2)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
