id: asus-rog-strix-x870e-e-gaming-wifi
manufacturer: ASUS
model: ROG STRIX X870E-E GAMING WIFI
chipset: AMD X870E
socket: AM5
form_factor: ATX
schema_version: "2.0"

memory:
  type: DDR5
  max_speed_mhz: 8000
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: true
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M.2_1 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M.2_2 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_2
          logic: any_populated
        condition: M.2_2 and M.2_3 are both occupied with SSD devices
        effect: PCIEX16(G5) will run x8 only

  - id: m2_3
    label: M.2_3 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "22110"
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_3
          logic: any_populated
        condition: M.2_2 and M.2_3 are both occupied with SSD devices
        effect: PCIEX16(G5) will run x8 only

  - id: m2_4
    label: M.2_4 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_5
    label: M.2_5 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

pcie_slots:
  - id: pcie_1
    label: PCIEX16(G5)
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCIEX16(G4)
    position: 2
    gen: 4
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: true
    sharing: null

sata_ports:
  - id: sata_1
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_2
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_3
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_4
    version: "3.0"
    source: Chipset
    disabled_by: null

sources:
  - type: manual
    url: https://dlcdnets.asus.com/pub/ASUS/mb/SocketAM5/ROG_STRIX_X870E-E_GAMING_WIFI/E25504_ROG_STRIX_X870E-E_GAMING_WIFI_EM_V2_WEB.pdf
  - type: manufacturer
