id: asus-rog-strix-x870-f-gaming-wifi
manufacturer: ASUS
model: ROG STRIX X870-F GAMING WIFI
chipset: AMD X870
socket: AM5
form_factor: ATX
length_mm: 305
width_mm: 244
schema_version: "1.0"

memory:
  type: DDR5
  max_speed_mhz: 8000
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: true
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M.2_1 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M.2_2 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "22110"
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_2
          logic: any_populated
        condition: M.2_2 is occupied with SSD device
        effect: PCIEX16(G5) will run x8 only

  - id: m2_3
    label: M.2_3 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: disables
        targets:
          - pcie_2
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_3
          logic: any_populated
        condition: M.2_3 is occupied with SSD device
        effect: PCIEX16(G4) will be disabled

  - id: m2_4
    label: M.2_4 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

pcie_slots:
  - id: pcie_1
    label: PCIEX16(G5)
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCIEX16(G4)
    position: 2
    gen: 4
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: true
    sharing: null

sata_ports:
  - id: sata_1
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_2
    version: "3.0"
    source: Chipset
    disabled_by: null

slot_positions:
  - slot_type: cpu
    slot_id: cpu_socket
    x_pct: 35.0
    y_pct: 16.0
    width_pct: 13.0
    height_pct: 16.0

  - slot_type: dimm
    slot_id: dimm_a1
    x_pct: 62.0
    y_pct: 5.0
    width_pct: 2.5
    height_pct: 42.0

  - slot_type: dimm
    slot_id: dimm_a2
    x_pct: 65.0
    y_pct: 5.0
    width_pct: 2.5
    height_pct: 42.0

  - slot_type: dimm
    slot_id: dimm_b1
    x_pct: 68.0
    y_pct: 5.0
    width_pct: 2.5
    height_pct: 42.0

  - slot_type: dimm
    slot_id: dimm_b2
    x_pct: 71.0
    y_pct: 5.0
    width_pct: 2.5
    height_pct: 42.0

  - slot_type: m2
    slot_id: m2_1
    x_pct: 15.0
    y_pct: 42.0
    width_pct: 26.2
    height_pct: 9.0

  - slot_type: m2
    slot_id: m2_2
    x_pct: 12.0
    y_pct: 58.0
    width_pct: 36.1
    height_pct: 9.0

  - slot_type: m2
    slot_id: m2_3
    x_pct: 12.0
