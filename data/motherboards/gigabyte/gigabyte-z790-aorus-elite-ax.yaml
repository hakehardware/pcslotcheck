id: gigabyte-z790-aorus-elite-ax
manufacturer: Gigabyte
model: Z790 AORUS ELITE AX
chipset: Intel Z790
socket: LGA 1700
form_factor: ATX
length_mm: 305
width_mm: 244
schema_version: "1.0"

memory:
  type: DDR5
  max_speed_mhz: 7600
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2a_cpu
    label: M2A_CPU
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2m_sb
    label: M2M_SB
    interface: PCIe_or_SATA
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: Chipset
    supports_sata: true
    heatsink_included: true
    sharing:
      - type: disables
        targets:
          - sata_2
          - sata_3
        direction: m2_to_sata
        trigger:
          slot_ids:
            - m2m_sb
          logic: any_populated
        condition: M.2 PCIe SSD installed in M2M_SB
        effect: SATA3 2 and SATA3 3 will be unavailable

  - id: m2p_sb
    label: M2P_SB
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2q_sb
    label: M2Q_SB
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

pcie_slots:
  - id: pciex16
    label: PCIEX16 (CPU)
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pciex4_1
    label: PCIEX4_1 (Chipset)
    position: 2
    gen: 4
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

  - id: pciex4_2
    label: PCIEX4_2 (Chipset)
    position: 3
    gen: 4
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

sata_ports:
  - id: sata_1
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_2
    version: "3.0"
    source: Chipset
    disabled_by: m2m_sb

  - id: sata_3
    version: "3.0"
    source: Chipset
    disabled_by: m2m_sb

  - id: sata_4
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_5
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_6
    version: "3.0"
    source: Chipset
    disabled_by: null

