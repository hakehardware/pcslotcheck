id: gigabyte-x870-aorus-elite-wifi7-ice
manufacturer: Gigabyte
model: X870 AORUS ELITE WIFI7 ICE
chipset: AMD X870
socket: AM5
form_factor: ATX
length_mm: 305
width_mm: 244
schema_version: "1.0"

memory:
  type: DDR5
  max_speed_mhz: 8200
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M2A_CPU
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M2B_CPU
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_2
          logic: any_populated
        condition: M2B_CPU or M2C_CPU connector is populated
        effect: PCIEX16 slot operates at up to x8 mode

  - id: m2_3
    label: M2C_CPU
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_3
          logic: any_populated
        condition: M2B_CPU or M2C_CPU connector is populated
        effect: PCIEX16 slot operates at up to x8 mode

  - id: m2_4
    label: M2D_SB
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: disables
        targets:
          - pcie_2
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_4
          logic: any_populated
        condition: Device installed in M2D_SB connector
        effect: PCIEX4 slot becomes unavailable

pcie_slots:
  - id: pcie_1
    label: PCIEX16
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCIEX4
    position: 2
    gen: 4
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

  - id: pcie_3
    label: PCIEX2
    position: 3
    gen: 3
    electrical_lanes: 2
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

