id: gigabyte-z890-aorus-master
manufacturer: Gigabyte
model: Z890 AORUS MASTER
chipset: Z890
socket: LGA1851
form_factor: ATX
schema_version: "2.0"

memory:
  type: DDR5
  max_speed_mhz: 9500
  base_speed_mhz: 5600
  max_capacity_gb: 256
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2a_cpu
    label: M2A_CPU
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2b_cpu
    label: M2B_CPU
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2d_cpu
    label: M2D_CPU
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pciex16
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2d_cpu
          logic: any_populated
        condition: Device installed in M2D_CPU connector
        effect: PCIEX16 slot operates at up to x8 mode

  - id: m2m_sb
    label: M2M_SB
    interface: PCIe_or_SATA
    gen: 4
    lanes: 4
    form_factors:
      - "2280"
    source: Chipset
    supports_sata: true
    heatsink_included: true
    sharing: null

  - id: m2p_sb
    label: M2P_SB
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

pcie_slots:
  - id: pciex16
    label: PCIEX16 (CPU)
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pciex4
    label: PCIEX4 (Chipset)
    position: 2
    gen: 4
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

  - id: pciex1
    label: PCIEX1 (Chipset)
    position: 3
    gen: 4
    electrical_lanes: 1
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

sata_ports:
  - id: sata_1
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_2
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_3
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_4
    version: "3.0"
    source: Chipset
    disabled_by: null

sources:
  - type: manual
    url: https://download.gigabyte.com/FileList/Manual/mb_manual_z890-aorus-master_1004_e.pdf
  - type: manufacturer
    url: https://www.gigabyte.com/Motherboard/Z890-AORUS-MASTER/sp
