id: gigabyte-z790-aorus-master
manufacturer: Gigabyte
model: Z790 AORUS MASTER
chipset: Intel Z790
socket: LGA 1700
form_factor: E-ATX
length_mm: 305
width_mm: 260
schema_version: "1.0"

memory:
  type: DDR5
  max_speed_mhz: 8000
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2a_cpu
    label: M2A_CPU
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2c_cpu
    label: M2C_CPU
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pciex16
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2c_cpu
          logic: any_populated
        condition: Device installed in M2C_CPU connector
        effect: PCIEX16 slot operates at up to x8 mode

  - id: m2m_sb
    label: M2M_SB
    interface: PCIe_or_SATA
    gen: 4
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: true
    heatsink_included: true
    sharing: null

  - id: m2p_sb
    label: M2P_SB
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2q_sb
    label: M2Q_SB
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

pcie_slots:
  - id: pciex16
    label: PCIEX16 (CPU)
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pciex4
    label: PCIEX4 (Chipset)
    position: 2
    gen: 4
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

  - id: pciex1
    label: PCIEX1 (Chipset)
