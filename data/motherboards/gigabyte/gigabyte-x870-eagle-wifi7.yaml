id: gigabyte-x870-eagle-wifi7
manufacturer: Gigabyte
model: X870 EAGLE WIFI7
chipset: AMD X870
socket: AM5
form_factor: ATX
length_mm: 305
width_mm: 244
schema_version: "1.0"

memory:
  type: DDR5
  max_speed_mhz: 8200
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M2A_CPU
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
      - "25110"
      - "2580"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M2B_SB
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
      - "25110"
      - "2580"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_3
    label: M2C_SB
    interface: PCIe
    gen: 4
    lanes: 2
    form_factors:
      - "22110"
      - "2280"
      - "25110"
      - "2580"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: m2_2
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_3
          logic: any_populated
        condition: PCIe SSD installed in M2C_SB connector
        effect: M2B_SB operates at up to x2 mode

pcie_slots:
  - id: pcie_1
    label: PCIEX16
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCIEX1_1
    position: 2
    gen: 3
    electrical_lanes: 1
    physical_size: x1
    source: Chipset
    reinforced: false
    sharing: null

  - id: pcie_3
    label: PCIEX1_2
    position: 3
    gen: 3
    electrical_lanes: 1
    physical_size: x1
    source: Chipset
    reinforced: false
    sharing: null

