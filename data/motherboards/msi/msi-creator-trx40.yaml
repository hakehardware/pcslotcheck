  max_speed_mhz: 4666
  base_speed_mhz: 3200
  max_capacity_gb: 256
  ecc_support: true
  channels: 4
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: true
    - id: dimm_a2
      channel: A
      position: 2
      recommended: false
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
