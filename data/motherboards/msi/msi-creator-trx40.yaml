      channel: D
      position: 1
      recommended: false
    - id: dimm_d2
      channel: D
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_d2
      - dimm_b2
    four_dimm:
      - dimm_d2
      - dimm_c2
      - dimm_a1
      - dimm_b2
    eight_dimm:
      - dimm_d2
      - dimm_d1
      - dimm_c2
      - dimm_c1
      - dimm_a1
      - dimm_a2
      - dimm_b1
      - dimm_b2

