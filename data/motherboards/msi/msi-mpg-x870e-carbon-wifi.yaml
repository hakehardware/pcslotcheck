id: msi-mpg-x870e-carbon-wifi
manufacturer: MSI
model: MPG X870E CARBON WIFI
chipset: AMD X870E
socket: AM5
form_factor: ATX
schema_version: "2.0"

memory:
  type: DDR5
  max_speed_mhz: 9000
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M2_1 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M2_2 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_2
          logic: any_populated
        condition: PCI_E1, PCI_E2, and M.2_2 share CPU bandwidth
        effect: PCI_E1 runs at x8 when M.2_2 and/or PCI_E2 are populated. See manual PCIe config table for full details.

  - id: m2_3
    label: M2_3 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_4
    label: M2_4 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

pcie_slots:
  - id: pcie_1
    label: PCI_E1 (CPU)
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCI_E2 (CPU)
    position: 2
    gen: 5
    electrical_lanes: 4
    physical_size: x16
    source: CPU
    reinforced: false
    sharing: null

  - id: pcie_3
    label: PCI_E3 (Chipset)
    position: 3
    gen: 4
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

sata_ports:
  - id: sata_1
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_2
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_3
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_4
    version: "3.0"
    source: Chipset
    disabled_by: null

sources:
  - type: manual
    url: https://download-2.msi.com/archive/mnu_exe/mb/MPGX870ECARBONWIFI_English.pdf
  - type: manufacturer
    url: https://www.msi.com/Motherboard/MPG-X870E-CARBON-WIFI/Specification
