id: msi-meg-x870e-godlike
manufacturer: MSI
model: MEG X870E GODLIKE
chipset: AMD X870E
socket: AM5
form_factor: E-ATX
length_mm: 304.8
width_mm: 277
schema_version: "1.0"

memory:
  type: DDR5
  max_speed_mhz: 9200
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M2_1 (CPU via XPANDER)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M2_2 (CPU via XPANDER)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_2
          logic: any_populated
        condition: M2_2 slot has device installed and USB4 40Gbps ports active
        effect: Both USB4 and M2_2 run at PCIe 5.0 x2

  - id: m2_3
    label: M2_3 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_4
    label: M2_4 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 2
    form_factors:
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_3
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_4
          logic: any_populated
        condition: Device installed in M2_4 slot
        effect: PCI_E3 will run at x2 speed

  - id: m2_5
    label: M2_5 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

pcie_slots:
  - id: pcie_1
    label: PCI_E1
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCI_E2
    position: 2
    gen: 5
    electrical_lanes: 8
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_3
    label: PCI_E3
    position: 3
    gen: 4
    electrical_lanes: 4
    physical_size: x4
    source: Chipset
    reinforced: false
    sharing: null

