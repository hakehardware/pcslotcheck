id: msi-pro-b760m-a-wifi
manufacturer: MSI
model: PRO B760M-A WIFI
chipset: Intel B760M
socket: LGA 1700
form_factor: Micro-ATX
schema_version: "2.0"

memory:
  type: DDR5
  max_speed_mhz: 6800
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M2_1 (CPU)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: false
    sharing: null

  - id: m2_2
    label: M2_2 (Chipset)
    interface: PCIe_or_SATA
    gen: 4
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: true
    heatsink_included: false
    sharing:
      - type: disables
        targets:
          - sata_8
        direction: m2_to_sata
        trigger:
          slot_ids:
            - m2_2
          logic: any_populated
        condition: M.2 SATA SSD installed in M2_2 slot
        effect: SATA8 will be unavailable

pcie_slots:
  - id: pcie_1
    label: PCI_E1
    position: 1
    gen: 4
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCI_E2
    position: 2
    gen: 3
    electrical_lanes: 1
    physical_size: x1
    source: Chipset
    reinforced: false
    sharing: null

  - id: pcie_3
    label: PCI_E3
    position: 3
    gen: 4
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

sata_ports:
  - id: sata_5
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_6
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_7
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_8
    version: "3.0"
    source: Chipset
    disabled_by: m2_2

sources:
  - type: manual
    url: https://download.msi.com/archive/mnu_exe/mb/PROB760M-AWIFI.pdf
  - type: manufacturer
    url: https://www.msi.com/Motherboard/PRO-B760M-A-WIFI/Specification
