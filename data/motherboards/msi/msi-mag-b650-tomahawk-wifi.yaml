id: msi-mag-b650-tomahawk-wifi
manufacturer: MSI
model: MAG B650 TOMAHAWK WIFI
chipset: B650
socket: AM5
form_factor: ATX
schema_version: "2.0"

memory:
  type: DDR5
  max_speed_mhz: 7600
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M2_1 (CPU)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M2_2 (CPU)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_3
    label: M2_3 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_2
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_3
          logic: any_populated
        condition: M2_3 and PCI_E2 both have devices installed
        effect: M2_3 runs at x2 and PCI_E2 runs at x2

pcie_slots:
  - id: pcie_1
    label: PCI_E1 (CPU)
    position: 1
    gen: 4
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCI_E2 (Chipset)
    position: 2
    gen: 4
    electrical_lanes: 2
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

  - id: pcie_3
    label: PCI_E3 (Chipset)
    position: 3
    gen: 3
    electrical_lanes: 1
    physical_size: x1
    source: Chipset
    reinforced: false
    sharing: null

sata_ports:
  - id: sata_1
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_2
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_3
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_4
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_a1
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_a2
    version: "3.0"
    source: Chipset
    disabled_by: null

sources:
  - type: manufacturer
    url: https://www.msi.com/Motherboard/MAG-B650-TOMAHAWK-WIFI/Specification
