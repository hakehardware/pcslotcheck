id: msi-mag-b760m-mortar-wifi-ddr4
manufacturer: MSI
model: MAG B760M MORTAR WIFI DDR4
chipset: Intel B760
socket: LGA 1700
form_factor: Micro-ATX
length_mm: 243.84
width_mm: 243.84
schema_version: "1.0"

memory:
  type: DDR4
  max_speed_mhz: 5200
  base_speed_mhz: 3200
  max_capacity_gb: 128
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M2_1 (CPU)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M2_2 (Chipset)
    interface: PCIe_or_SATA
    gen: 4
    lanes: 4
    form_factors:
      - "2242"
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: true
    heatsink_included: true
    sharing:
      - type: disables
        targets:
          - sata_8
        direction: m2_to_sata
        trigger:
          slot_ids:
            - m2_2
          logic: any_populated
        condition: M.2 SATA SSD installed in M2_2
        effect: SATA8 will be unavailable

pcie_slots:
