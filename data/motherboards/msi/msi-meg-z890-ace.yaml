id: msi-meg-z890-ace
manufacturer: MSI
model: MEG Z890 ACE
chipset: Intel Z890
socket: LGA 1851
form_factor: ATX
schema_version: "2.0"

memory:
  type: DDR5
  max_speed_mhz: 9200
  base_speed_mhz: 4800
  max_capacity_gb: 256
  ecc_support: false
  channels: 2
  slots:
    - id: dimm_a1
      channel: A
      position: 1
      recommended: false
    - id: dimm_a2
      channel: A
      position: 2
      recommended: true
    - id: dimm_b1
      channel: B
      position: 1
      recommended: false
    - id: dimm_b2
      channel: B
      position: 2
      recommended: true
  recommended_population:
    two_dimm:
      - dimm_a2
      - dimm_b2
    four_dimm:
      - dimm_a2
      - dimm_b2
      - dimm_a1
      - dimm_b1

m2_slots:
  - id: m2_1
    label: M2_1 (CPU)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_2
    label: M2_2 (CPU)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_3
    label: M2_3 (Chipset)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "2260"
      - "2280"
    source: Chipset
    supports_sata: false
    heatsink_included: true
    sharing: null

  - id: m2_4
    label: M2_4 (CPU+Chipset)
    interface: PCIe
    gen: 5
    lanes: 4
    form_factors:
      - "22110"
      - "2260"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: true
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: m2_to_pcie
        trigger:
          slot_ids:
            - m2_4
          logic: any_populated
        condition: PCIe Gen 5 M.2 device installed in M2_4 slot
        effect: PCI_E1 will run at x8 speed and PCI_E2 will run at x4 speed

  - id: m2_5
    label: M2_5 (Chipset)
    interface: PCIe_or_SATA
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: Chipset
    supports_sata: true
    heatsink_included: true
    sharing: null

pcie_slots:
  - id: pcie_1
    label: PCI_E1 (CPU)
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_2
    label: PCI_E2 (CPU)
    position: 2
    gen: 5
    electrical_lanes: 8
    physical_size: x16
    source: CPU
    reinforced: false
    sharing:
      - type: bandwidth_split
        target: pcie_1
        direction: pcie_to_m2
        trigger:
          slot_ids:
            - pcie_2
          logic: any_populated
        condition: PCI_E2 slot has a device installed
        effect: PCI_E1 will run at x8 speed

  - id: pcie_3
    label: PCI_E3 (Chipset)
    position: 3
    gen: 4
    electrical_lanes: 4
    physical_size: x16
    source: Chipset
    reinforced: false
    sharing: null

sata_ports:
  - id: sata_1
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_2
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_3
    version: "3.0"
    source: Chipset
    disabled_by: null

  - id: sata_4
    version: "3.0"
    source: Chipset
    disabled_by: null

sources:
  - type: manual
    url: https://download-2.msi.com/archive/mnu_exe/mb/MEGZ890ACE_English.pdf
  - type: manufacturer
    url: https://www.msi.com/Motherboard/MEG-Z890-ACE/Specification
