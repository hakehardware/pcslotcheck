    label: M.2_1 (PCIe 4.0 x4)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: false
    sharing: null

  - id: m2_2
    label: M.2_2 (PCIe 4.0 x4)
    interface: PCIe
    gen: 4
    lanes: 4
    form_factors:
      - "22110"
      - "2280"
    source: CPU
    supports_sata: false
    heatsink_included: false
    sharing: null

pcie_slots:
  - id: pcie_x16_1
    label: PCIe 5.0 x16 Slot 1
    position: 1
    gen: 5
    electrical_lanes: 16
    physical_size: x16
    source: CPU
    reinforced: true
    sharing: null

  - id: pcie_x16_2
    label: PCIe 5.0 x16 Slot 2
    position: 2
    gen: 5
