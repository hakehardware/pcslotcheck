id: supermicro-h13sra-tf
manufacturer: Supermicro
model: H13SRA-TF
chipset: AMD TRX50
socket: sTR5
form_factor: ATX
schema_version: "1.0"

memory:
  type: DDR5
  max_speed_mhz: 5200
  base_speed_mhz: 4800
  max_capacity_gb: 1024
  ecc_support: true
  channels: 4
  slots:
    - id: dimma1
      channel: A
      position: 1
      recommended: true
    - id: dimmc1
      channel: C
      position: 1
      recommended: true
    - id: dimme1
      channel: E
      position: 1
      recommended: true
    - id: dimmg1
      channel: G
      position: 1
      recommended: true
  recommended_population:
    two_dimm:
      - dimma1
      - dimmc1
    four_dimm:
      - dimma1
      - dimmc1
      - dimme1
      - dimmg1

m2_slots:
